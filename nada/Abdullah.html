
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abdallah & Dondon 💖</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      height:100vh;
      background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
      font-family: Arial, sans-serif;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
    }

    .content{
      position:relative;
      z-index:2;
      text-align:center;
      top:50%;
      transform:translateY(-50%);
      padding:20px;
    }

    h1{
      color:white;
      font-size:50px;
      text-shadow:0 0 10px rgba(0,0,0,0.4);
    }

    p{
      color:white;
      font-size:22px;
      margin-top:15px;
      line-height:1.8;
      text-shadow:0 0 8px rgba(0,0,0,0.3);
    }

    .fullscreen{
      position:fixed;
      bottom:15px;
      right:15px;
      z-index:3;
      padding:10px 15px;
      border:none;
      border-radius:10px;
      background:white;
      color:#ff4d6d;
      cursor:pointer;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="content">
  <h1>❤️ Abdallah & Dondon ❤️</h1>

  <p>
    كل سنة وانتي طيبة يا دندن 🌹<br>
    دا أول عيد أضحى لينا سوا 💖<br>
    ربنا يخليكي ليا ونفضلنا دايمًا مع بعض 💕
  </p>
</div>

<button class="fullscreen" onclick="toggleFullScreen()">Full Screen</button>

<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// تشغيل الموسيقى تلقائي + إعادة تشغيل تلقائي
window.addEventListener("load", () => {
  const music = document.getElementById("music");
  music.volume = 0.4;

  const playPromise = music.play();
  if(playPromise !== undefined){
    playPromise.catch(() => {
      document.body.addEventListener("click", () => {
        music.play();
      }, { once:true });
    });
  }
});

function toggleFullScreen(){
  if (!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ❤️ Hearts animation
const hearts = [];
const total = 50;

class Heart{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height - canvas.height;
    this.size = Math.random()*20 + 10;
    this.speedY = Math.random()*1.5 + 1;
    this.speedX = Math.random()*1 - 0.5;
  }

  update(){
    this.y += this.speedY;
    this.x += this.speedX;

    if(this.y > canvas.height){
      this.y = -20;
      this.x = Math.random()*canvas.width;
    }
  }

  draw(){
    ctx.fillStyle = "#ff2d55";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.bezierCurveTo(this.x+this.size/2, this.y-this.size/2, this.x+this.size, this.y+this.size/3, this.x, this.y+this.size);
    ctx.bezierCurveTo(this.x-this.size, this.y+this.size/3, this.x-this.size/2, this.y-this.size/2, this.x, this.y);
    ctx.fill();
  }
}

for(let i=0;i<total;i++) hearts.push(new Heart());

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  hearts.forEach(h=>{
    h.update();
    h.draw();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
